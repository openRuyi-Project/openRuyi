name: "Build failure"
description: "Report a package that is failing to build."
title: "PACKAGENAME: Build failure"
labels: ["Type: Build Failure", "Target: Rolling"]
body:
  - type: "markdown"
    attributes:
      value: |
        Welcome to openRuyi. Please replace the **`PACKAGENAME: Build failure`** template above with the correct package name.
        ---
  - type: "input"
    id: "name"
    attributes:
      label: "Package name"
      description: "Please indicate the name of the package."
    validations:
      required: true
  - type: "input"
    id: "openruyi-version"
    attributes:
      label: "openRuyi version"
      description: |
        Please indicate the version number of this package on which you encountered this build failure.
    validations:
      required: true
  - type: "textarea"
    id: "how-to-reproduce"
    attributes:
      label: "Steps to reproduce"
      description: "Please include a step-by-step guide for reproducing this issue. Consider writing in concise, numbered bullet points to ensure that openRuyi developers can retrace your steps."
    validations:
      required: true
  - type: "dropdown"
    id: "obs"
    attributes:
      label: "Can openRuyi's build system reproduce this build failure?"
      description: |
        Can the `openRuyi` project, which is on the [openRuyi build system](https://build.openruyi.cn), reproduce this build failure?
      options:
        - "Please select the OBS Status."
        - "Yes, OBS can reproduce this build failure."
        - "No, OBS cannot reproduce this build failure."
        - "OBS is currently rebuilding this package."
      default: 0
    validations:
      required: true
  - type: "textarea"
    id: "logs"
    attributes:
      label: "Relevant log output"
      description: |
        Please copy and paste the logs from the failed build.
        This will be automatically formatted into code, so no need for backticks.
      render: "console"
    validations:
      required: true
  - type: "textarea"
    id: "additional-context"
    attributes:
      label: "Additional context"
      description: "Add any other context about the problem here."
    validations:
      required: false
  - type: "checkboxes"
    id: "sanity-check"
    attributes:
      label: "I assert that this issue is relevant for openRuyi"
      description: |
        This bug tracker is for actionable issues that are not the result of user error. If you need help using your system and are unsure if this is a bug with openRuyi, please consider asking for help on the [openRuyi Discord Server](https://discord.gg/ycDafzwsud) before opening an issue.
      options:
        - label: "I assert that this is a bug and not a support request."
          required: true
        - label: "I assert that this is not a duplicate of an existing issue."
          required: true
        - label: "I assert that I have read the [openRuyi Code of Conduct](https://openruyi.cn/governance/legal/code-of-conduct) and agree to abide by it."

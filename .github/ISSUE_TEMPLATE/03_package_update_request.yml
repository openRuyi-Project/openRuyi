name: "Update request"
description: "Create an update request for an existing, but outdated package."
title: "PACKAGENAME: OLDVERSION → NEWVERSION"
labels: ["Type: Packaging", "Target: Rolling"]
body:
  - type: "markdown"
    attributes:
      value: |
        Welcome to openRuyi. Please replace the **`PACKAGENAME: OLDVERSION → NEWVERSION`** template above with the correct package name, the current version of the package, and the latest version of the package.

        ---
  - type: "input"
    id: "name"
    attributes:
      label: "Package name"
      description: "Please indicate the name of the package."
    validations:
      required: true
  - type: "input"
    id: "upstream-version"
    attributes:
      label: "Upstream version"
      description: "Please indicate the latest version of the package."
    validations:
      required: true
  - type: "input"
    id: "openruyi-version"
    attributes:
      label: "openRuyi version"
      description: |
        Please indicate the current version number in openRuyi's repository.
    validations:
      required: true
  - type: "input"
    id: "changelog"
    attributes:
      label: "Changelog"
      description: "If applicable, please link the upstream changelog for the latest version."
    validations:
      required: false
  - type: "textarea"
    id: "additional-context"
    attributes:
      label: "Additional context"
      description: "Add any other context about the update here."
    validations:
      required: false
  - type: "checkboxes"
    id: "sanity-check"
    attributes:
      label: "I assert that this issue is relevant for openRuyi"
      options:
        - label: "I assert that this package update does not yet exist in an open pull request."
          required: true
        - label: "I assert that this is not a duplicate of an existing issue."
          required: true
        - label: "I assert that I have read the [openRuyi Code of Conduct](https://openruyi.cn/governance/legal/code-of-conduct) and agree to abide by it."

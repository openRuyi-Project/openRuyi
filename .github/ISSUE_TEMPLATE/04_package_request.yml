name: "Package request"
description: "Create a request for a new package."
title: "PACKAGENAME: Package request"
labels: ["Type: Packaging", "Target: Rolling"]
body:
  - type: "markdown"
    attributes:
      value: |
        Welcome to openRuyi. Please replace the **`PACKAGENAME: Package request`** template above with the correct package name.

        We invite you to submit a pull request to contribute new packages to openRuyi. If you are interested in doing so, please check out our [docs](https://openruyi.cn/docs/intro) and feel free to ask for help on the [openRuyi Discord Server](https://discord.gg/ycDafzwsud).

        ---
  - type: "input"
    id: "name"
    attributes:
      label: "Package name"
      description: "Please indicate the name of the package."
    validations:
      required: true
  - type: "input"
    id: "upstream-version"
    attributes:
      label: "Upstream version"
      description: "Please indicate the latest version of the package."
    validations:
      required: true
  - type: "input"
    id: "reason"
    attributes:
      label: "Reason for inclusion"
      description: "Please write a concise justification for why this package should be included in openRuyi."
    validations:
      required: true
  - type: "textarea"
    id: "additional-context"
    attributes:
      label: "Additional context"
      description: "Add any other context about the request here."
    validations:
      required: false
  - type: "checkboxes"
    id: "sanity-check"
    attributes:
      label: "I assert that this issue is relevant for openRuyi"
      options:
        - label: "I assert that this package request does not yet exist in an open pull request."
          required: true
        - label: "I assert that this is not a duplicate of an existing issue."
          required: true
        - label: "I assert that I have read the [openRuyi Code of Conduct](https://openruyi.cn/governance/legal/code-of-conduct) and agree to abide by it."
